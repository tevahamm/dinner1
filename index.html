<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalila 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fce4ec;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .heart-float {
    position: absolute;
    opacity: 0.12;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.12; }
    100% { transform: translateY(-120px) rotate(25deg); opacity: 0; }
  }

  .card {
    background: white;
    border-radius: 32px;
    padding: 48px 56px 40px;
    text-align: center;
    box-shadow: 0 24px 70px rgba(233, 30, 99, 0.18);
    max-width: 480px;
    width: 90%;
    position: relative;
    z-index: 1;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .cat {
    width: 110px;
    height: 110px;
    margin: 0 auto 28px;
    animation: bounce 2.2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 900;
    color: #1a1a2e;
    margin-bottom: 36px;
    line-height: 1.3;
  }

  .buttons-wrapper {
    position: relative;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  #yes-btn {
    background: #e91e63;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 42px;
    font-size: 1.2rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, padding 0.3s ease, font-size 0.3s ease;
    box-shadow: 0 6px 20px rgba(233, 30, 99, 0.35);
    position: relative;
    z-index: 2;
  }
  #yes-btn:hover { background: #c2185b; transform: scale(1.07); }


  #no-btn {
    background: #f0f0f0;
    color: #888;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    position: relative;
    transition: font-size 0.2s, opacity 0.3s;
    white-space: nowrap;
    z-index: 2;
  }

  .hint {
    margin-top: 20px;
    font-size: 0.78rem;
    color: #bbb;
    font-style: italic;
  }

  /* Success */
  #success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  #success-screen.show {
    display: flex;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #success-screen h2 {
    font-size: 2.2rem;
    font-weight: 900;
    color: #e91e63;
  }
  #success-screen p {
    font-size: 1rem;
    color: #aaa;
    font-weight: 600;
  }
  #ryan-gif {
    width: 100%;
    max-width: 340px;
    border-radius: 16px;
    margin-top: 8px;
    box-shadow: 0 8px 30px rgba(233,30,99,0.2);
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 999;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="hearts-bg" id="hearts-bg"></div>

<div class="card" id="card">

  <!-- Question screen -->
  <div id="question-screen">
    <div class="cat">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,42 10,18 34,32" fill="#e8a87c"/>
        <polygon points="22,40 15,22 32,33" fill="#f5c4a0"/>
        <polygon points="82,42 90,18 66,32" fill="#e8a87c"/>
        <polygon points="78,40 85,22 68,33" fill="#f5c4a0"/>
        <ellipse cx="50" cy="58" rx="36" ry="34" fill="#e8a87c"/>
        <ellipse cx="50" cy="68" rx="22" ry="16" fill="#f5c4a0" opacity="0.5"/>
        <ellipse cx="38" cy="52" rx="5" ry="5.5" fill="#2c2c2c"/>
        <ellipse cx="62" cy="52" rx="5" ry="5.5" fill="#2c2c2c"/>
        <circle cx="40" cy="50" r="1.5" fill="white"/>
        <circle cx="64" cy="50" r="1.5" fill="white"/>
        <ellipse cx="50" cy="61" rx="3.5" ry="2.5" fill="#e76fa3"/>
        <path d="M46 64 Q50 68 54 64" stroke="#c25080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="14" y1="60" x2="44" y2="63" stroke="#c8a070" stroke-width="1.2" opacity="0.6"/>
        <line x1="14" y1="65" x2="44" y2="65" stroke="#c8a070" stroke-width="1.2" opacity="0.6"/>
        <line x1="56" y1="63" x2="86" y2="60" stroke="#c8a070" stroke-width="1.2" opacity="0.6"/>
        <line x1="56" y1="65" x2="86" y2="65" stroke="#c8a070" stroke-width="1.2" opacity="0.6"/>
        <path d="M68,22 C68,19 71,17 73,19 C75,17 78,19 78,22 C78,25 73,29 73,29 C73,29 68,25 68,22 Z" fill="#e91e63"/>
      </svg>
    </div>

    <h1>Jalila, would you like to<br>have dinner with me? 🍽️</h1>

    <div class="buttons-wrapper" id="buttons-wrapper">
      <button id="yes-btn" onclick="onYes()">Yes 😉</button>
      <button id="no-btn" onmouseover="runAway()" ontouchstart="runAway()">No</button>
    </div>

    <p class="hint">"No" seems a bit shy 🐾</p>
  </div>

  <!-- Success screen -->
  <div id="success-screen">
    <div style="font-size:3rem">🎉</div>
    <h2>YAY!! 🎊</h2>
    <p>I knew you'd say yes 😉</p>
    <img id="ryan-gif"
      src="https://media4.giphy.com/media/OfkGZ5H2H3f8Y/giphy.gif"
      alt="Jonah Hill YAY celebrating"
    />
  </div>

</div>

<script>
  // Floating hearts
  const bg = document.getElementById('hearts-bg');
  const emojis = ['💕','💖','💗','💓','🌸','✨','🐱'];
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    h.style.animationDuration = (6 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 8) + 's';
    bg.appendChild(h);
  }

  let noCount = 0;
  const noBtn  = document.getElementById('no-btn');
  const yesBtn = document.getElementById('yes-btn');

  function runAway() {
    noCount++;
    const cardEl = document.getElementById('card');
    const cRect  = cardEl.getBoundingClientRect();
    const bW = noBtn.offsetWidth;
    const bH = noBtn.offsetHeight;

    noBtn.style.position = 'fixed';
    noBtn.style.transform = 'none';
    noBtn.style.width = 'auto';
    noBtn.style.maxWidth = 'fit-content';

    let nx, ny;
    for (let t = 0; t < 15; t++) {
      nx = cRect.left + 20 + Math.random() * (cRect.width  - bW - 40);
      ny = cRect.top  + 20 + Math.random() * (cRect.height - bH - 40);
      const yRect = yesBtn.getBoundingClientRect();
      const yesCx = yRect.left + yRect.width  / 2;
      const yesCy = yRect.top  + yRect.height / 2;
      if (Math.hypot(nx + bW/2 - yesCx, ny + bH/2 - yesCy) > 100) break;
    }
    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';


  }

  function onYes() {
    document.getElementById('question-screen').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#e91e63','#f48fb1','#ff80ab','#fce4ec','#ff4081','#c51162','#ffb6c1','#fff'];
    for (let i = 0; i < 100; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width  = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4500);
      }, i * 25);
    }
  }
</script>
</body>
</html>
